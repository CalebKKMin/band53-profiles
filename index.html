<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>53 밴드 프로필 모음</title>
<style>
  :root {
    --primary: #3730a3;
    --primary-light: #4f46e5;
    --bg: #f1f0fb;
    --card-bg: #ffffff;
    --text: #1e293b;
    --text-muted: #64748b;
    --border: #e2e8f0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #1e1b6e 0%, #3730a3 60%, #4f46e5 100%);
    color: white; padding: 20px 16px 24px; text-align: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }
  header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.5px; }
  header p  { font-size: 0.8rem; opacity: 0.85; margin-top: 4px; }
  .stats-bar { display: flex; justify-content: center; gap: 20px; margin-top: 12px; font-size: 0.78rem; opacity: 0.9; }
  .stats-bar span b { font-size: 1rem; }

  .controls { max-width: 960px; margin: 16px auto 0; padding: 0 12px; }
  .search-box { position: relative; margin-bottom: 10px; }
  .search-box input {
    width: 100%; padding: 11px 16px 11px 42px;
    border: 2px solid var(--border); border-radius: 10px;
    font-size: 0.95rem; background: white; outline: none;
    transition: border 0.2s; font-family: inherit; color: var(--text);
  }
  .search-box input:focus { border-color: var(--primary-light); }
  .search-box .icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }

  .filter-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 6px; }
  .filter-group { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
  .filter-label { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; white-space: nowrap; }
  .filter-btn {
    padding: 5px 12px; border: 1.5px solid var(--border); border-radius: 20px;
    background: white; color: var(--text); font-size: 0.78rem; cursor: pointer;
    transition: all 0.15s; font-family: inherit; white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--primary-light); color: var(--primary); }
  .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

  .result-info { max-width: 960px; margin: 10px auto 6px; padding: 0 12px; font-size: 0.8rem; color: var(--text-muted); }

  .grid {
    max-width: 960px; margin: 0 auto; padding: 0 12px 24px;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px;
  }

  .card {
    background: var(--card-bg); border-radius: 12px; border: 1.5px solid var(--border);
    padding: 14px 10px 12px; text-align: center;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06); cursor: pointer; transition: all 0.15s;
  }
  .card:hover { border-color: var(--primary-light); box-shadow: 0 4px 16px rgba(55,48,163,0.13); transform: translateY(-2px); }

  .avatar {
    width: 72px; height: 72px; border-radius: 50%; margin: 0 auto 10px;
    overflow: hidden; background: #c7d2fe;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem; font-weight: 700; color: #3730a3;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .card-name { font-size: 0.9rem; font-weight: 700; margin-bottom: 5px; }
  .tag-year {
    display: inline-block; padding: 2px 8px; border-radius: 20px;
    font-size: 0.68rem; font-weight: 600; background: #ede9fe; color: #5b21b6;
  }
  .tag-noyear {
    display: inline-block; padding: 2px 8px; border-radius: 20px;
    font-size: 0.68rem; font-weight: 600; background: #f1f5f9; color: #94a3b8;
  }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 100; align-items: center; justify-content: center; padding: 16px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white; border-radius: 16px; max-width: 320px; width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden;
    animation: slideUp 0.2s ease; text-align: center;
  }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-photo {
    width: 110px; height: 110px; border-radius: 50%; margin: 24px auto 12px;
    overflow: hidden; background: #c7d2fe;
    display: flex; align-items: center; justify-content: center;
    font-size: 2.5rem; font-weight: 700; color: #3730a3;
    border: 3px solid #ede9fe;
  }
  .modal-photo img { width: 100%; height: 100%; object-fit: cover; }
  .modal-name { font-size: 1.5rem; font-weight: 800; padding: 0 20px; }
  .modal-year {
    display: inline-block; margin: 8px 0 20px;
    padding: 4px 14px; border-radius: 20px;
    font-size: 0.82rem; font-weight: 600; background: #ede9fe; color: #5b21b6;
  }
  .modal-close {
    display: block; width: calc(100% - 40px); margin: 0 20px 20px;
    padding: 11px; background: var(--primary); color: white;
    border: none; border-radius: 10px; font-size: 0.9rem; font-weight: 600;
    cursor: pointer; font-family: inherit;
  }
  .modal-close:hover { background: var(--primary-light); }

  .no-results { text-align: center; padding: 48px 16px; color: var(--text-muted); font-size: 0.9rem; grid-column: 1/-1; }
  .no-results .emoji { font-size: 2.5rem; display: block; margin-bottom: 10px; }

  @media (max-width: 480px) {
    .grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
  }
</style>
</head>
<body>

<header>
  <h1>53 밴드 프로필 모음</h1>
  <p>멤버 정보 조회 시스템</p>
  <div class="stats-bar">
    <span>전체 <b id="totalCount">152</b>명</span>
  </div>
</header>

<div class="controls">
  <div class="search-box">
    <span class="icon">🔍</span>
    <input type="text" id="searchInput" placeholder="이름으로 검색..." autocomplete="off">
  </div>
  <div class="filter-row">
    <div class="filter-group">
      <span class="filter-label">또래</span>
      <button class="filter-btn active" data-filter="year" data-value="">전체</button>
      <button class="filter-btn" data-filter="year" data-value="93">93년</button>
      <button class="filter-btn" data-filter="year" data-value="94">94년</button>
      <button class="filter-btn" data-filter="year" data-value="95">95년</button>
      <button class="filter-btn" data-filter="year" data-value="96">96년</button>
      <button class="filter-btn" data-filter="year" data-value="97">97년</button>
      <button class="filter-btn" data-filter="year" data-value="98">98년</button>
      <button class="filter-btn" data-filter="year" data-value="99">99년</button>
      <button class="filter-btn" data-filter="year" data-value="00">00년</button>
      <button class="filter-btn" data-filter="year" data-value="none">미기재</button>
    </div>
  </div>
</div>

<div class="result-info" id="resultInfo"></div>
<div class="grid" id="grid"></div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-photo" id="modalPhoto"></div>
    <div class="modal-name" id="modalName"></div>
    <div id="modalYear"></div>
    <button class="modal-close" onclick="closeModalBtn()">닫기</button>
  </div>
</div>

<script>
let data = [], filters = { year: '' }, search = '';

async function loadData() {
  data = await (await fetch('data.json')).json();
  document.getElementById('totalCount').textContent = data.length;
  render();
}

function makeCard(p) {
  const initial = p.name.trim()[0];
  const avatarHtml = p.photo
    ? `<img src="images/${p.photo}" alt="${p.name}" onerror="this.parentElement.textContent='${initial}'">`
    : initial;
  const yearTag = p.year
    ? `<span class="tag-year">🎂 ${p.year}년생</span>`
    : `<span class="tag-noyear">또래 미기재</span>`;
  return `
    <div class="card" onclick='showModal(${JSON.stringify(p).replace(/'/g,"&#39;")})'>
      <div class="avatar">${avatarHtml}</div>
      <div class="card-name">${p.name.trim()}</div>
      ${yearTag}
    </div>`;
}

function render() {
  const q = search.toLowerCase();
  const filtered = data.filter(p => {
    if (q && !p.name.trim().includes(q)) return false;
    if (filters.year === 'none' && p.year !== '') return false;
    if (filters.year && filters.year !== 'none' && p.year !== filters.year) return false;
    return true;
  });
  const grid = document.getElementById('grid');
  grid.innerHTML = filtered.length
    ? filtered.map(makeCard).join('')
    : '<div class="no-results"><span class="emoji">🔍</span>검색 결과가 없습니다.</div>';
  const anyFilter = Object.values(filters).some(Boolean) || q;
  document.getElementById('resultInfo').textContent = anyFilter
    ? `${filtered.length}명 표시 중 (전체 ${data.length}명)`
    : `전체 ${data.length}명`;
}

document.getElementById('searchInput').addEventListener('input', e => { search = e.target.value.trim(); render(); });
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const f = btn.dataset.filter, v = btn.dataset.value;
    filters[f] = v;
    document.querySelectorAll(`.filter-btn[data-filter="${f}"]`).forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

function showModal(p) {
  const initial = p.name.trim()[0];
  const photoEl = document.getElementById('modalPhoto');
  photoEl.innerHTML = p.photo
    ? `<img src="images/${p.photo}" alt="${p.name}" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.textContent='${initial}'">`
    : initial;
  document.getElementById('modalName').textContent = p.name.trim();
  document.getElementById('modalYear').innerHTML = p.year
    ? `<span class="modal-year">🎂 ${p.year}년생</span>`
    : `<span class="modal-year" style="background:#f1f5f9;color:#94a3b8">또래 미기재</span>`;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(e) { if (e.target === document.getElementById('modalOverlay')) closeModalBtn(); }
function closeModalBtn() { document.getElementById('modalOverlay').classList.remove('open'); document.body.style.overflow = ''; }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalBtn(); });

loadData();
</script>
</body>
</html>
